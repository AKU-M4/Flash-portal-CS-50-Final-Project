<!-- templates/register.html -->
{% extends "auth_layout.html" %}

{% block title %}Register{% endblock %}

{% block header %}
<h2>Create Account</h2>
<p class="subtitle">Join our gaming community</p>
{% endblock %}

{% block content %}
    <form action="{{ url_for('register') }}" method="post" class="auth-form">
        <div class="form-group">
            <i class='bx bx-user'></i>
            <input autocomplete="off" type="text" name="username" placeholder="Username" required>
        </div>
        <div class="form-group">
            <i class='bx bx-envelope'></i>
            <input autocomplete="off" type="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <i class='bx bx-lock-alt'></i>
            <input autocomplete="off" type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="auth-button">Register</button>
        <p class="switch-auth">
            Already have an account? 
            <a href="{{ url_for('login') }}">Login</a>
        </p>
    </form>
{% endblock %}
